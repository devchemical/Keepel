name: Dokploy Preview Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  issues: read
  pull-requests: read

jobs:
  check-preview-ready:
    name: Validate Preview URL
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Wait for Dokploy preview and verify URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Esperando el despliegue preview de la PR #$PR_NUMBER..."

          PREVIEW_URL=""
          COMMENT_BODY=""

          # Dokploy y GitHub Actions se disparan prácticamente a la vez.
          # Esta espera reduce el riesgo de leer un comentario antiguo.
          sleep 10

          for i in {1..30}; do
            echo "Intento $i/30: consultando comentarios..."

            RESPONSE=$(curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments")

            COMMENT_BODY=$(echo "$RESPONSE" | jq -r '
              [
                .[]
                | select(
                    (.body // "")
                    | test("https://[^[:space:]>)]+\\.pr\\.chemicaldev\\.com"; "i")
                  )
              ]
              | sort_by(.updated_at)
              | last
              | .body // empty
            ')

            if [ -z "$COMMENT_BODY" ]; then
              echo "Todavía no hay comentario de Dokploy."
              sleep 15
              continue
            fi

            echo "Comentario de Dokploy encontrado."

            if echo "$COMMENT_BODY" | grep -iqE 'failed|failure|error'; then
              echo "::error::Dokploy indica que el despliegue ha fallado."
              echo "$COMMENT_BODY"
              exit 1
            fi

            if echo "$COMMENT_BODY" | grep -iqE 'building|pending|deploying|queued|progress'; then
              echo "La preview sigue construyéndose..."
              sleep 15
              continue
            fi

            PREVIEW_URL=$(echo "$COMMENT_BODY" \
              | grep -oE 'https://[a-zA-Z0-9.-]+\.pr\.chemicaldev\.com[^[:space:]<>()]*' \
              | sed -E 's/[),.;]+$//' \
              | head -n 1)

            if [ -n "$PREVIEW_URL" ] &&
               echo "$COMMENT_BODY" | grep -iqE 'done|success|deployed|ready|running'; then
              echo "Dokploy ha terminado el despliegue."
              break
            fi

            echo "La URL existe, pero el estado final aún no está confirmado."
            sleep 15
          done

          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::No se encontró una URL de preview válida."
            echo "Último comentario encontrado:"
            echo "$COMMENT_BODY"
            exit 1
          fi

          echo "Preview detectada: $PREVIEW_URL"

          for i in {1..12}; do
            STATUS=$(curl \
              --silent \
              --show-error \
              --insecure \
              --location \
              --output /dev/null \
              --write-out '%{http_code}' \
              --connect-timeout 10 \
              --max-time 30 \
              "$PREVIEW_URL" || true)

            echo "Intento HTTP $i/12: $STATUS"

            case "$STATUS" in
              200|204|301|302|307|308)
                echo "La preview responde correctamente."
                exit 0
                ;;
            esac

            sleep 10
          done

          echo "::error::La preview no devolvió un estado HTTP válido."
          exit 1
